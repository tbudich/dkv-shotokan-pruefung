<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#b91c1c" />
    <script>
      // Apply the stored/system theme before first paint to avoid a flash.
      // Mirrors src/useTheme.ts (default mode: 'system').
      (function () {
        var m = localStorage.getItem('theme')
        if (m !== 'light' && m !== 'dark' && m !== 'system') m = 'system'
        var dark = m === 'dark' || (m === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        var eff = dark ? 'dark' : 'light'
        document.documentElement.setAttribute('data-theme', eff)
        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', dark ? '#0f1115' : '#b91c1c')
      })()
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shotokan PO" />
    <meta
      name="description"
      content="Mobile Prüfungsordnung Shotokan im Deutschen Karate Verband – 9. Kyu bis 8. Dan."
    />
    <title>DKV Shotokan Prüfungsordnung</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
