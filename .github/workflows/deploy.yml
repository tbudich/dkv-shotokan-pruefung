name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Run the actions' JS runtime on Node 24 (Node 20 is deprecated on GitHub runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow one concurrent deployment, cancel in-progress runs of older commits.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Lint, unit tests, build, and hermetic e2e — all against a single build of
  # the app, which is then uploaded as the Pages artifact. Tests gate the deploy:
  # if any step fails, `deploy` never runs. The build happens exactly once here
  # (the Playwright webServer only previews this dist, it does not rebuild).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # Run Playwright directly (not `npm run test:e2e`) so the `pretest:e2e`
      # build hook is skipped — we reuse the dist built in the step above.
      - run: npx playwright test
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    # Only needs to checkout and make outbound HTTP requests; drop the
    # workflow-level pages:write / id-token:write.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:deploy
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.page_url }}
          EXPECTED_COMMIT: ${{ github.sha }}
